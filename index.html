    <title>My Wardrobe Palette</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              champagne: '#D4A373',
              linen: '#FDFCFB', // Warmer linen
              charcoal: '#2D2424', // New Espresso Charcoal replacement for Navy
              accent: '#FF5733', 
              skyblue: '#BAE6FD',
              deepsky: '#0EA5E9',
            },
            fontFamily: {
              sans: ['Poppins', 'sans-serif'],
              serif: ['Shippori Mincho', 'serif'],
            },
          }
        }
      }
    </script>
